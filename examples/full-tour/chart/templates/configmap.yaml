apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "full-tour.fullname" . }}-env
  namespace: {{ include "full-tour.namespace" . }}
  labels:
    {{- include "full-tour.labels" . | nindent 4 }}
data:
  HTTP_PORT: {{ .Values.app.httpPort | quote }}
  POSTGRES_URL: {{ .Values.postgres.url | quote }}
  REDIS_URL: {{ .Values.redis.url | quote }}
  AWS_ENDPOINT_URL: {{ include "full-tour.awsEndpointUrl" . | quote }}
  AWS_REGION: {{ .Values.aws.region | quote }}
  AWS_DEFAULT_REGION: {{ .Values.aws.region | quote }}
  AWS_EC2_METADATA_DISABLED: "true"
  S3_BUCKET: {{ .Values.aws.s3Bucket | quote }}
  OPENSEARCH_URL: {{ include "full-tour.opensearchUrl" . | quote }}
  OPENSEARCH_INDEX: {{ .Values.opensearch.index | quote }}
