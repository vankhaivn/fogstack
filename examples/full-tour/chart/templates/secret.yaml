apiVersion: v1
kind: Secret
metadata:
  name: {{ include "full-tour.fullname" . }}-aws
  namespace: {{ include "full-tour.namespace" . }}
  labels:
    {{- include "full-tour.labels" . | nindent 4 }}
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: {{ .Values.aws.accessKeyId | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.aws.secretAccessKey | quote }}
