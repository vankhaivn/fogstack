apiVersion: v1
kind: Service
metadata:
  name: {{ include "full-tour.fullname" . }}
  namespace: {{ include "full-tour.namespace" . }}
  labels:
    {{- include "full-tour.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "full-tour.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
