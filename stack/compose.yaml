name: fogstack

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16.14-alpine3.23}
    container_name: fogstack-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fogstack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-test}
      POSTGRES_DB: ${POSTGRES_DB:-appdb}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - fogstack-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      retries: 10

volumes:
  fogstack-pgdata: {}
