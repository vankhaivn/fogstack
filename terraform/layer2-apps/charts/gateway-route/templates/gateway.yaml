apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gatewayName | quote }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    app.kubernetes.io/managed-by: fogstack
spec:
  gatewayClassName: {{ .Values.gatewayClassName | quote }}
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
